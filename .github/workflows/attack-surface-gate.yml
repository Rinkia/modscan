# Dogfood: run MODScan's own attack-surface gate on MODScan itself. This proves
# the reusable Action works in real CI (the only real acceptance test for an
# Action) and guards MODScan — which imports and executes target code in its
# validator — against silently growing new execution sinks.
#
# It installs modscan from THIS checkout (-e .), so the gate uses the PR's own
# code; the reusable Action then skips its PyPI install because modscan is
# already importable.
name: Attack-surface gate

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  attack-surface-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # the gate needs the base branch to diff against

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MODScan from this checkout (dogfood the PR's own code)
        run: python -m pip install -e .

      - name: Gate on newly-introduced execution sinks
        uses: ./attack-surface
        with:
          path: modscan
          fail-on: high
