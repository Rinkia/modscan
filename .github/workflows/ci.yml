name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  self-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (core only, no LLM SDKs)
        run: python -m pip install -e .

      - name: Run self-checks
        run: |
          # Auto-discover every test module so new ones run without editing CI.
          # test_live_smoke is opt-in (real API) and skips unless MODSCAN_LIVE=1.
          for f in tests/test_*.py; do
            echo "== $f =="
            python "$f"
          done

      - name: Import works without LLM SDKs
        run: python -c "import modscan; print('modscan import OK', len(modscan.__all__), 'exports')"

  benchmark-labels-untouched:
    # The ground truth only means something if it cannot be quietly adjusted in
    # the same change as the heuristic it would flatter. Labels may still change
    # - but in their own pull request, reviewed on their own evidence.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Refuse a PR that edits both the labels and the ranking code
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          changed=$(git diff --name-only "$BASE" "$HEAD")
          labels=$(echo "$changed" | grep -c '^benchmarks/ground_truth\.json$' || true)
          # Language front-ends decide what even becomes a candidate, so a
          # front-end change can flatter a score exactly as a weight change can.
          # The Python parser is the same hole: collapsing @overload stubs
          # removed 91 SQLAlchemy candidates and moved every median with them.
          ranking=$(echo "$changed" | grep -cE '^modscan/(detector|graph|parser)\.py$|^modscan/languages/.*\.py$' || true)
          if [ "$labels" -gt 0 ] && [ "$ranking" -gt 0 ]; then
            echo "::error::This PR changes benchmarks/ground_truth.json AND the ranking code."
            echo "Split it: land the label change on its own, justified by the target's"
            echo "documentation, then land the heuristic and report its measured effect."
            exit 1
          fi
          echo "OK: labels and ranking code are not changed together."
