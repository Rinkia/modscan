# Composite GitHub Action: fail a pull request that INTRODUCES new execution
# sinks (eval/exec, pickle/marshal/yaml deserialization, os.system/subprocess,
# dynamic loaders), so new attack surface gets a review conversation instead of
# landing silently. Runs `modscan-audit` on the PR and on the base branch and
# diffs the two — no LLM, no API key, no committed snapshot. Pure static analysis.
#
# It gates the DELTA, never the standing surface: sinks that already exist on the
# base branch never fail the check.
#
# This is an attack-surface map, NOT a vulnerability scan: no taint analysis, no
# CVE matching, no secret detection. A passing check is not a clean bill of health.
#
# NOTE: both sides are scanned with the SAME modscan build, so a release that adds
# catalogue entries can report sinks that were always in the code — they are new to
# the detector, not to the codebase. Pin `modscan-version` if you want a baseline
# that only moves when you choose.
#
# Consumer prerequisites (in the calling workflow):
#   * checkout with `fetch-depth: 0` (the base branch must be reachable);
#   * `permissions: pull-requests: write` and `GH_TOKEN` set, to comment.
name: MODScan attack-surface gate
description: Fail a PR that introduces new execution sinks (no LLM, no API key).
branding:
  icon: alert-triangle
  color: red

inputs:
  path:
    description: Path to the source tree to scan (same on base and PR).
    required: false
    default: "."
  base-ref:
    description: "Base git ref to diff against (default: the PR's base branch)."
    required: false
    default: ""
  fail-on:
    description: >-
      Fail when a sink of at least this severity is introduced:
      high | medium | low | none. Default "high" — measured across real packages,
      the medium tier is dominated by routine __reduce__, dynamic-import and
      subprocess code, so gating on it is noisy for plugin hosts.
    required: false
    default: high
  exclude:
    description: Directory to skip, repeatable via newline-separated values.
    required: false
    default: ""
  modscan-version:
    description: modscan version to install from PyPI, if not already installed (empty = latest).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install MODScan (skip if already available)
      shell: bash
      run: |
        if python -c "import modscan.security" 2>/dev/null; then
          echo "modscan already installed - using it"
        elif [ -n "${{ inputs.modscan-version }}" ]; then
          python -m pip install "modscan==${{ inputs.modscan-version }}"
        else
          python -m pip install modscan
        fi

    - name: Audit attack surface (PR and base) and diff
      id: gate
      shell: bash
      run: |
        set -euo pipefail
        base_ref="${{ inputs.base-ref }}"
        [ -z "$base_ref" ] && base_ref="$GITHUB_BASE_REF"
        if [ -z "$base_ref" ]; then
          echo "::error::no base ref - run this on a pull_request, or set base-ref." >&2
          exit 2
        fi

        excl=()
        while IFS= read -r line; do
          [ -n "$line" ] && excl+=(--exclude "$line")
        done <<< "${{ inputs.exclude }}"

        audit() { modscan-audit "$1" --json "${excl[@]}" --label "${{ inputs.path }}"; }

        # PR tree (the current checkout)
        audit "${{ inputs.path }}" > /tmp/modscan-surface-pr.json

        # Base tree via a throwaway worktree, so the PR checkout is untouched
        git worktree add --detach /tmp/modscan-surface-base "origin/$base_ref"
        audit "/tmp/modscan-surface-base/${{ inputs.path }}" > /tmp/modscan-surface-base.json
        git worktree remove --force /tmp/modscan-surface-base

        # Diff (exit 1 = a sink at or above the threshold was introduced)
        set +e
        modscan-audit --diff /tmp/modscan-surface-base.json /tmp/modscan-surface-pr.json \
          --fail-on "${{ inputs.fail-on }}" --label "${{ inputs.path }}" \
          > /tmp/modscan-surface-diff.md
        echo "introduced=$?" >> "$GITHUB_OUTPUT"
        set -e
        cat /tmp/modscan-surface-diff.md | tee -a "$GITHUB_STEP_SUMMARY"

    - name: Comment the diff on the PR (sticky - update in place, don't stack)
      if: always() && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        num="${{ github.event.pull_request.number }}"
        marker="<!-- modscan-attack-surface-diff -->"
        # Find a prior attack-surface comment by its own marker and edit it. The
        # marker differs from the breaking-change gate's, so a repo running both
        # keeps two independent comments.
        cid=$(gh api "repos/${{ github.repository }}/issues/$num/comments" \
          --jq "map(select(.body | contains(\"$marker\"))) | .[-1].id // empty" 2>/dev/null || true)
        if [ -n "$cid" ]; then
          gh api "repos/${{ github.repository }}/issues/comments/$cid" -X PATCH \
            -F body=@/tmp/modscan-surface-diff.md >/dev/null && exit 0
        fi
        gh pr comment "$num" --body-file /tmp/modscan-surface-diff.md || \
          echo "::warning::could not comment (needs pull-requests: write and GH_TOKEN)"

    - name: Fail on newly-introduced sinks
      if: steps.gate.outputs.introduced == '1'
      shell: bash
      run: |
        echo "::error::This PR introduces new execution sinks at or above severity '${{ inputs.fail-on }}' - review before merging." >&2
        exit 1
