# Composite GitHub Action: fail a pull request that removes or changes a
# codebase's extension points, so a library's plugin/mod authors are not broken
# silently. Runs `modscan detect` on the PR and on the base branch and diffs the
# two — no LLM, no API key, no committed manifest. Pure static analysis.
#
# Consumer prerequisites (in the calling workflow):
#   * checkout with `fetch-depth: 0` (the base branch must be reachable);
#   * `permissions: pull-requests: write` and `GH_TOKEN` set, to comment;
#   * needs modscan >= the release carrying `diff`-of-`detect` output.
name: MODScan breaking-change gate
description: Fail a PR that removes or changes extension points (no LLM, no API key).
branding:
  icon: shield
  color: purple

inputs:
  path:
    description: Path to the source tree to scan (same on base and PR).
    required: false
    default: "."
  language:
    description: "Source language: python (default) | typescript | javascript."
    required: false
    default: python
  base-ref:
    description: "Base git ref to diff against (default: the PR's base branch)."
    required: false
    default: ""
  min-score:
    description: Minimum moddability score. Keep low — the gate compares the set of points, not their ranking.
    required: false
    default: "0.0"
  modscan-version:
    description: modscan version to install from PyPI, if not already installed (empty = latest).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install MODScan (skip if already available)
      shell: bash
      run: |
        if python -c "import modscan" 2>/dev/null; then
          echo "modscan already installed — using it"
        elif [ -n "${{ inputs.modscan-version }}" ]; then
          python -m pip install "modscan==${{ inputs.modscan-version }}"
        else
          python -m pip install modscan
        fi

    - name: Detect extension points (PR and base) and diff
      id: gate
      shell: bash
      run: |
        set -euo pipefail
        base_ref="${{ inputs.base-ref }}"
        [ -z "$base_ref" ] && base_ref="$GITHUB_BASE_REF"
        if [ -z "$base_ref" ]; then
          echo "::error::no base ref — run this on a pull_request, or set base-ref." >&2
          exit 2
        fi

        detect() { modscan detect "$1" --language "${{ inputs.language }}" --min-score "${{ inputs.min-score }}" --json; }

        # PR tree (the current checkout)
        detect "${{ inputs.path }}" > /tmp/modscan-pr.json

        # Base tree via a throwaway worktree, so the PR checkout is untouched
        git worktree add --detach /tmp/modscan-base "origin/$base_ref"
        detect "/tmp/modscan-base/${{ inputs.path }}" > /tmp/modscan-base.json
        git worktree remove --force /tmp/modscan-base

        # Diff (exit 1 = a point was removed or its category/kind changed)
        set +e
        modscan diff /tmp/modscan-base.json /tmp/modscan-pr.json > /tmp/modscan-diff.md
        echo "breaking=$?" >> "$GITHUB_OUTPUT"
        set -e
        cat /tmp/modscan-diff.md | tee -a "$GITHUB_STEP_SUMMARY"

    - name: Comment the diff on the PR (sticky — update in place, don't stack)
      if: always() && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        num="${{ github.event.pull_request.number }}"
        marker="<!-- modscan-extension-point-diff -->"
        # Find a prior MODScan comment by its hidden marker and edit it; otherwise
        # post a new one. Keeps one up-to-date comment instead of one per re-push.
        cid=$(gh api "repos/${{ github.repository }}/issues/$num/comments" \
          --jq "map(select(.body | contains(\"$marker\"))) | .[-1].id // empty" 2>/dev/null || true)
        if [ -n "$cid" ]; then
          gh api "repos/${{ github.repository }}/issues/comments/$cid" -X PATCH \
            -F body=@/tmp/modscan-diff.md >/dev/null && exit 0
        fi
        gh pr comment "$num" --body-file /tmp/modscan-diff.md || \
          echo "::warning::could not comment (needs pull-requests: write and GH_TOKEN)"

    - name: Fail on breaking changes
      if: steps.gate.outputs.breaking == '1'
      shell: bash
      run: |
        echo "::error::Extension points were removed or changed — plugins/mods may break." >&2
        exit 1
