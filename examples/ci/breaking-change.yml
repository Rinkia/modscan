# MODScan breaking-change gate — copy this into a library whose plugin/mod
# authors depend on its extension points, to fail any PR that removes or changes
# one of them.
#
# This is the FREE, zero-prerequisite variant: it diffs `modscan detect` on the
# PR against the base branch. No committed manifest, no LLM, no API key.
#
# Prerequisites in the consuming repo:
#   * check out with `fetch-depth: 0` (the gate needs the base branch);
#   * grant `pull-requests: write` so it can comment.
#
# (An earlier variant diffed a committed, LLM-generated extension-points.json.
#  That is only worth it if you already publish generated docs; the gate below
#  supersedes it for everyone else — it is always current and costs nothing.)

name: Extension-API gate

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: Rinkia/modscan/breaking-change@v0.1.3
        with:
          path: your_package # <-- the source tree that holds your extension points
