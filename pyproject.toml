[project]
name = "modscan"
version = "0.0.1"
description = "Scan a codebase, generate everything needed to write plugins and mods for it"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
modscan = "modscan.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["modscan*"]
